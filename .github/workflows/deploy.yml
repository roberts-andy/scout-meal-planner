name: Deploy to Azure

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - '.github/workflows/infra.yml'
      - '.github/workflows/ci.yml'
      - '*.md'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - '.github/workflows/infra.yml'
      - '.github/workflows/ci.yml'
      - '*.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Detect which parts changed ──
  changes:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'tailwind.config.js'
              - 'index.html'
              - 'staticwebapp.config.json'
            api:
              - 'api/**'

  # ── Frontend → SWA (no Azure Login needed) ──
  deploy_frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /dist
          config_file_location: /
          skip_app_build: true

  # ── API → Container App (needs Azure Login — push/dispatch only, OIDC creds don't match PR subject) ──
  deploy_api:
    needs: changes
    if: |
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    name: Deploy API
    env:
      ACR_NAME: crscoutmealplanner
      CONTAINER_APP_NAME: ca-scout-meal-planner
      RESOURCE_GROUP: rg-scout-meal-planner
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push container image
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${CONTAINER_APP_NAME}:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${ACR_NAME}.azurecr.io/${CONTAINER_APP_NAME}:latest" api/
          docker push "$IMAGE"
          docker push "${ACR_NAME}.azurecr.io/${CONTAINER_APP_NAME}:latest"

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image "${ACR_NAME}.azurecr.io/${CONTAINER_APP_NAME}:${{ github.sha }}"

  # ── PR cleanup ──
  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
