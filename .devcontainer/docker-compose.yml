services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:20
    volumes:
      - ..:/workspaces/scout-meal-planner:cached
    command: sleep infinity
    environment:
      # Accept the emulator's self-signed TLS certificate
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      # COSMOS_CONNECTION_STRING is injected via Codespaces repo secret.
      # See README or .github/copilot-instructions.md for setup instructions.
    depends_on:
      cosmos:
        condition: service_started

  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    mem_limit: 3g
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 5
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "0.0.0.0"
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    volumes:
      - cosmos-data:/tmp/cosmos/appdata
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8081/_explorer/emulator.pem"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  cosmos-data:
